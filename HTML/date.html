<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eine wichtige Frage ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(-45deg, #ff7eb3, #ffb3c6, #ffd6e0, #ffe5ec);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(15px);
    padding: 45px;
    border-radius: 28px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

h1 {
    color: white;
    font-size: 3rem;
    margin-bottom: 35px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
}

button {
    border: none;
    cursor: pointer;
    border-radius: 16px;
    padding: 18px 45px;
    font-size: 24px;
    transition: transform 0.15s;
}

#yes {
    background: #2ecc71;
    color: white;
}

#yes:hover {
    transform: scale(1.1);
}

#no {
    position: absolute;
    background: #ff3b30;
    color: white;
    left: 58%;
    top: 56%;
}

.heart {
    position: absolute;
    color: rgba(255,255,255,0.75);
    animation: floatUp 6s linear forwards;
    pointer-events: none;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 0;
    }
    20% {
        opacity: 1;
    }
    to {
        transform: translateY(-120px);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>🥹 Willst du mit mir auf ein Date gehen?</h1>
        <button id="yes">Ja ❤️</button>
    </div>
</div>

<button id="no">Nein</button>

<audio id="cheer" src="yay.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>
const no = document.getElementById("no");
const yes = document.getElementById("yes");
const cheer = document.getElementById("cheer");

let tries = 0;

const texts = [
    "Nein",
    "Sicher?",
    "🥺",
    "Wirklich?",
    "Nicht heute",
    "Fast 😏",
    "Keine Chance",
    "Du gibst nicht auf 😂"
];

function clamp(value, min, max) {
    return Math.max(min, Math.min(value, max));
}

document.addEventListener("mousemove", (e) => {
    const rect = no.getBoundingClientRect();

    const buttonX = rect.left + rect.width / 2;
    const buttonY = rect.top + rect.height / 2;

    const dx = buttonX - e.clientX;
    const dy = buttonY - e.clientY;

    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 180) {
        tries++;

        no.innerText = texts[Math.min(Math.floor(tries / 4), texts.length - 1)];

        const force = 28;
        const angle = Math.atan2(dy, dx);

        let newX = rect.left + Math.cos(angle) * force;
        let newY = rect.top + Math.sin(angle) * force;

        const margin = 15;

        newX = clamp(newX, margin, window.innerWidth - rect.width - margin);
        newY = clamp(newY, margin, window.innerHeight - rect.height - margin);

        no.style.left = newX + "px";
        no.style.top = newY + "px";
    }
});

yes.onclick = () => {
    cheer.play();

    confetti({
        particleCount: 300,
        spread: 150,
        origin: { y: 0.6 }
    });

    setTimeout(() => {
        document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:linear-gradient(135deg,#ff7eb3,#ffd6ea);
            font-family:Arial, Helvetica, sans-serif;
            color:white;
            text-align:center;
        ">
            <h1 style="font-size:85px;">🥰</h1>
            <h1 style="font-size:70px;">YAY!!</h1>
            <h2 style="margin-top:20px;">
                Ich freue mich schon auf unser Date ❤️
            </h2>
            <div style="font-size:100px;margin-top:35px;">
                🎉💐❤️✨
            </div>
        </div>
        `;
    }, 700);
};

function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (18 + Math.random() * 22) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
